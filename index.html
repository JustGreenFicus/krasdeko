<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kras Deco — Мебель для жизни</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero">
        <nav class="navbar">
            <div class="logo">KRAS<br><span>DECO</span></div>
            
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>

            <ul class="nav-links">
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="#">Новинки</a></li>
                <li><a href="#">Акции</a></li>
                <li><a href="contacts.html">Контакты</a></li>
            </ul>
        </nav>

        <div class="hero-content">
            <h1>СОЗДАЙТЕ УЮТ<br>В ВАШЕМ ДОМЕ</h1>
            <p>Стильная мебель для жизни</p>
            <a href="catalog.html" class="btn-catalog">ПЕРЕЙТИ В КАТАЛОГ ↗</a>
        </div>

        <div class="product-tag">
            <span class="product-name">стул "Сканди"</span>
            <span class="product-price">по лучшей цене ₽</span>
        </div>
    </header>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Оформить заказ</h2>
            <p>Оставьте ваши контакты, и мы свяжемся с вами</p>
            <form id="contactForm">
                <input type="text" placeholder="Ваше имя" required>
                <input type="tel" placeholder="Ваш телефон" required>
                <button type="submit" class="btn-catalog">ОТПРАВИТЬ</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
