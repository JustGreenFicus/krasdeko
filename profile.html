<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет — Kras Deco</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: #0f121d;"> <nav class="navbar" style="position: relative;">
        <div class="logo">KRAS<br><span>DECO</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Главная</a></li>
            <li><a href="tables.html">Столы</a></li>
            <li><a href="#" onclick="logout()" style="color: #ff5e5e;">ВЫЙТИ</a></li>
        </ul>
    </nav>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="user-avatar">
                    <i class="fa-solid fa-user-gear"></i>
                </div>
                <h1 id="welcome-user">Добро пожаловать!</h1>
                <p class="user-status">Премиум клиент Kras Deco</p>
            </div>

            <div class="profile-info">
                <div class="info-item">
                    <label>ЛОГИН</label>
                    <span id="display-username">Загрузка...</span>
                </div>
                <div class="info-item">
                    <label>СТАТУС АККАУНТА</label>
                    <span>Активен</span>
                </div>
            </div>

            <a href="index.html" class="btn-catalog-main" style="margin-top: 30px; text-decoration: none;">ВЕРНУТЬСЯ К ПОКУПКАМ</a>
        </div>
    </div>

    <script>
        // Проверка авторизации
        const userData = JSON.parse(localStorage.getItem('user'));

        if (!userData) {
            window.location.href = 'index.html'; // Если не вошел — на главную
        } else {
            document.getElementById('welcome-user').innerText = `Привет, ${userData.username}!`;
            document.getElementById('display-username').innerText = userData.username;
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
