<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки — Kras Deco</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="profile-body">

    <nav class="navbar">
        <div class="logo">KRAS<br><span>DECO</span></div>
        <ul class="nav-links">
            <li><a href="index.html">На главную</a></li>
            <li><button onclick="logout()" class="btn-logout-top">ВЫЙТИ</button></li>
        </ul>
    </nav>

    <div class="settings-container">
        <aside class="settings-sidebar">
            <div class="sidebar-header">
                <div class="avatar-small" id="avatar-init">U</div>
                <p id="sidebar-name">User</p>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" onclick="showTab('general', this)">
                    <i class="fa-solid fa-user-pen"></i> Аккаунт
                </button>
                <button class="nav-item" onclick="showTab('privacy', this)">
                    <i class="fa-solid fa-shield-halved"></i> Безопасность
                </button>
                <button class="nav-item" onclick="showTab('help', this)">
                    <i class="fa-solid fa-circle-question"></i> Помощь
                </button>
                <hr>
                <button class="nav-item logout-red" onclick="logout()">
                    <i class="fa-solid fa-right-from-bracket"></i> Выйти
                </button>
            </nav>
        </aside>

        <main class="settings-content">
            
            <section id="general" class="tab-content active">
                <h2>Настройки профиля</h2>
                <div class="input-group">
                    <label>ВАШ НИКНЕЙМ</label>
                    <input type="text" id="new-username" placeholder="Новое имя">
                    <button class="btn-save" onclick="updateNickname()">Изменить никнейм</button>
                </div>
            </section>

            <section id="privacy" class="tab-content">
                <h2>Безопасность</h2>
                <div class="input-group">
                    <label>ТЕКУЩИЙ ПАРОЛЬ</label>
                    <input type="password" id="old-password">
                </div>
                <div class="input-group">
                    <label>НОВЫЙ ПАРОЛЬ</label>
                    <input type="password" id="update-password">
                </div>
                <button class="btn-save" onclick="updatePassword()">Обновить пароль</button>
                
                <div class="reset-email-box">
                    <p>Забыли пароль? Мы можем отправить ссылку на почту.</p>
                    <button class="btn-outline" onclick="resetPasswordEmail()">Сбросить через почту</button>
                </div>
            </section>

            <section id="help" class="tab-content">
                <h2>Центр поддержки</h2>
                <p>Возникли вопросы по заказу или работе сайта?</p>
                <div class="help-options">
                    <div class="help-card">
                        <i class="fa-solid fa-envelope"></i>
                        <span>Email: support@krasdeco.ru</span>
                    </div>
                    <div class="help-card chat-placeholder">
                        <i class="fa-solid fa-comments"></i>
                        <span>Чат с поддержкой (Скоро)</span>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="script.js"></script>
    <script>
        // Логика переключения табов
        function showTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        // Подгрузка данных
        const user = JSON.parse(localStorage.getItem('userAccount'));
        if(!user) window.location.href = 'index.html';
        
        document.getElementById('sidebar-name').innerText = user.username;
        document.getElementById('new-username').value = user.username;
        document.getElementById('avatar-init').innerText = user.username[0].toUpperCase();
    </script>
</body>
</html>
