        </ul>
    </nav>

    <main class="contacts-page">
        <div class="contact-card">
            <h2>СВЯЗАТЬСЯ С НАМИ</h2>
            <p class="contact-subtitle">Выберите удобный способ для связи или заказа</p>
            
            <div class="social-icons">
                <a href="https://m.vk.com/kakoy_to_kirill" target="_blank" class="social-link">
                    <i class="fa-brands fa-vk"></i>
                </a>
                <a href="https://t.me/JustGreenFicus" target="_blank" class="social-link">
                    <i class="fa-brands fa-telegram"></i>
                </a>
            </div>

            <div class="contact-details">
                <p><strong>Наш номер</strong> 8 (918) 008 15 46</p>
                <p><strong>Наша почта</strong> stol-art.ru@mail.ru</p>
            </div>

            <button class="btn-catalog btn-order" style="margin-top: 30px;">ЗАКАЗАТЬ ЗВОНОК</button>
        </div>
    </main>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Ждём ваш вопрос</h2>
            <form id="contactForm">
                <input type="text" placeholder="Ваше имя" required>
                <input type="tel" placeholder="Ваш телефон" required>
                <button type="submit" class="btn-catalog">ОТПРАВИТЬ</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
